<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Handball"/>
  <meta name="theme-color" content="#0f0f0f"/>
  <title>Handball Scoreboard</title>
  <link rel="apple-touch-icon" href="handball_icon.png"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0f0f0f; --card: #1a1a1a; --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #888; --btn: #252525; --btn-border: rgba(255,255,255,0.12); }
    .light { --bg: #f2f2f7; --card: #ffffff; --border: rgba(0,0,0,0.08); --text: #111; --muted: #888; --btn: #e5e5ea; --btn-border: rgba(0,0,0,0.12); }
    html { height: 100%; overflow: hidden; position: fixed; width: 100%; }
    body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: env(safe-area-inset-top, 16px) 12px env(safe-area-inset-bottom, 32px); display: flex; flex-direction: column; gap: 14px; transition: background 0.3s; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; transition: transform 0.1s; }
    button:active { transform: scale(0.93); }
    button:disabled { cursor: not-allowed; transform: none; }
    .tabbar { display: flex; gap: 4px; background: var(--card); border-radius: 14px; padding: 4px; margin-top: 8px; }
    .tabbar button { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 13px; font-weight: 500; color: var(--muted); min-height: 48px; }
    .tabbar button.active { background: var(--btn); color: var(--text); }
    .teams { display: flex; gap: 12px; align-items: stretch; }
    .team-card { position: relative; flex: 1; min-width: 0; background: var(--card); border: 0.5px solid var(--border); border-radius: 20px; padding: 24px 10px; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; min-height: 400px; justify-content: center; }
    .team-card:active { transform: scale(0.98); }
    .hz-badge { position: absolute; top: 12px; background: var(--btn); border: 0.5px solid var(--btn-border); border-radius: 10px; padding: 6px 14px; font-size: 18px; font-weight: 600; white-space: nowrap; }
    #card-a .hz-badge { right: 12px; }
    #card-b .hz-badge { left: 12px; }
    .team-name { font-size: 16px; font-weight: 500; text-align: center; word-break: break-word; padding: 4px 8px; min-height: 24px; }
    .team-score { font-size: 100px; font-weight: 500; line-height: 1; letter-spacing: -2px; }
    .minus-btn { position: absolute; bottom: 12px; right: 12px; width: 40px; height: 40px; border-radius: 50%; background: var(--btn); border: 0.5px solid var(--btn-border); color: var(--text); font-size: 22px; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .minus-btn:disabled { color: #444; }
    .clock-row { display: flex; align-items: stretch; gap: 8px; margin-top: 4px; }
    .clock-btn { padding: 14px 8px; border-radius: 14px; font-weight: 600; min-height: 80px; background: var(--btn); border: 0.5px solid var(--btn-border); display: flex; align-items: center; justify-content: center; white-space: nowrap; }
    .clock-start { flex: 0 0 18%; font-size: 28px; line-height: 0; overflow: hidden; }
    .clock-stop { flex: 0 0 18%; font-size: 30px; line-height: 0; overflow: hidden; }
    .clock-display { flex: 1 1 auto; min-width: 0; text-align: center; font-size: 38px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: 1px; padding: 18px 0; border-radius: 14px; background: var(--card); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .clock-display.running { color: #5cb85c; }
    .clock-display.done { color: #e24b4a; }
    .clock-start, .clock-stop { font-family: Arial, Helvetica, sans-serif; }
    .clock-half { flex: 0 0 22%; font-size: 12px; line-height: 1.2; white-space: normal; text-align: center; }
    .action-row { display: flex; gap: 10px; margin-top: 4px; }
    .save-btn { flex: 1; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 500; min-height: 54px; display: block; background: var(--btn); border: 0.5px solid var(--btn-border); color: var(--text); transition: background 0.3s, color 0.3s, transform 0.1s; }
    .save-btn:active { transform: scale(0.97); }
    .reset-area { text-align: center; }
    .reset-link { font-size: 14px; color: var(--muted); background: none; border: none; text-decoration: underline; padding: 12px 20px; min-height: 48px; }
    .reset-confirm { display: flex; gap: 10px; justify-content: center; align-items: center; }
    .reset-confirm span { font-size: 13px; color: var(--muted); }
    .btn-danger { padding: 12px 20px; border-radius: 10px; background: #e24b4a; color: #fff; font-size: 14px; min-height: 48px; }
    .btn-secondary { padding: 12px 20px; border-radius: 10px; border: 0.5px solid var(--btn-border); background: var(--btn); font-size: 14px; color: var(--text); min-height: 48px; }
    .settings-teams { display: flex; gap: 12px; align-items: stretch; }
    .settings-teams .settings-section { flex: 1; min-width: 0; }
    .settings-section { background: var(--card); border: 0.5px solid var(--border); border-radius: 18px; padding: 18px; display: flex; flex-direction: column; gap: 16px; }
    .settings-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field-label { font-size: 14px; color: var(--muted); }
    .name-input, .number-input { font-size: 16px; font-weight: 500; border: 0.5px solid var(--btn-border); border-radius: 10px; background: var(--btn); outline: none; color: var(--text); padding: 12px 14px; width: 100%; }
    .colors { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; padding: 0; display: flex; align-items: center; justify-content: center; }
    .swap-row-btn { padding: 14px; border-radius: 12px; background: var(--btn); border: 0.5px solid var(--btn-border); font-size: 14px; font-weight: 500; color: var(--text); min-height: 50px; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .settings-row-label { font-size: 15px; color: var(--text); }
    .toggle-btn { padding: 10px 16px; border-radius: 10px; background: var(--btn); border: 0.5px solid var(--btn-border); font-size: 14px; color: var(--text); min-height: 44px; display: flex; align-items: center; gap: 8px; }
    .history { display: flex; flex-direction: column; gap: 10px; }
    .history-empty { text-align: center; color: var(--muted); font-size: 14px; margin-top: 40px; }
    .history-empty .icon { font-size: 40px; margin-bottom: 10px; }
    .history-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 16px; }
    .history-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .history-meta span { font-size: 12px; color: var(--muted); }
    .del-btn { background: none; border: none; color: #555; font-size: 20px; padding: 4px 8px; min-height: 44px; min-width: 44px; border-radius: 8px; }
    .history-score-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .history-team { display: flex; align-items: center; gap: 8px; font-size: 15px; color: var(--text); }
    .history-dot { width: 12px; height: 12px; border-radius: 50%; }
    .history-score { font-size: 24px; font-weight: 500; letter-spacing: 4px; }
    .history-winner { font-size: 13px; color: var(--muted); text-align: center; }
    #color-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; }
    #color-modal .box { background:var(--card); border-radius:20px; padding:24px; width:300px; display:flex; flex-direction:column; gap:16px; }
    #color-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
  </style>
</head>
<body>

<div id="color-modal" onclick="if(event.target===this)cancelColor()">
  <div class="box">
    <div id="color-modal-title" style="font-size:16px; font-weight:500; color:var(--text); text-align:center;">Farbe wählen</div>
    <div id="color-grid"></div>
    <button id="color-cancel" onclick="cancelColor()" style="padding:14px; border-radius:12px; background:var(--btn); border:0.5px solid var(--btn-border); font-size:15px; color:var(--text);">Abbrechen</button>
  </div>
</div>

<div class="tabbar">
  <button class="active" onclick="showView('game')" id="tab-game">🤾 Spiel</button>
  <button onclick="showView('settings')" id="tab-settings">⚙️ Einstellungen</button>
  <button onclick="showView('history')" id="tab-history">📋 Historie</button>
</div>

<!-- GAME -->
<div id="view-game" style="display:contents">
  <div class="teams">
    <div class="team-card" id="card-a" onclick="addGoal('a')">
      <div class="hz-badge" id="hz-a">HZ 0</div>
      <div class="team-name" id="name-a">TuS Griesheim</div>
      <div class="team-score" id="disp-a">0</div>
      <button class="minus-btn" id="corr-minus-a" onclick="event.stopPropagation(); correct('a',-1)">−</button>
    </div>
    <div class="team-card" id="card-b" onclick="addGoal('b')">
      <div class="hz-badge" id="hz-b">HZ 0</div>
      <div class="team-name" id="name-b">Gast</div>
      <div class="team-score" id="disp-b">0</div>
      <button class="minus-btn" id="corr-minus-b" onclick="event.stopPropagation(); correct('b',-1)">−</button>
    </div>
  </div>

  <div class="clock-row">
    <button class="clock-btn clock-start" id="clock-btn" onclick="toggleClock()">&#x25B6;&#xFE0E;</button>
    <button class="clock-btn clock-stop" id="stop-btn" onclick="stopAndReset()">&#x21BB;</button>
    <div class="clock-display" id="clock-display">30:00</div>
    <button class="clock-btn clock-half" id="half-btn" onclick="setHalf(state.half === 0 ? 1 : 0)">1. Halbzeit</button>
  </div>

  <div class="action-row">
    <button class="save-btn" id="save-btn" onclick="askFinish()">🏁 Beenden &amp; speichern</button>
  </div>

  <div id="finish-confirm-area" class="reset-confirm" style="display:none; margin-top:4px;">
    <span id="finish-confirm-text">Spiel beenden und speichern?</span>
    <button class="btn-danger" id="finish-yes" onclick="saveGame()">Ja</button>
    <button class="btn-secondary" id="finish-no" onclick="cancelFinish()">Nein</button>
  </div>

  <div class="reset-area">
    <div id="reset-link-area">
      <button class="reset-link" id="reset-link" onclick="document.getElementById('reset-link-area').style.display='none';document.getElementById('reset-confirm-area').style.display='flex'">Spiel zurücksetzen</button>
    </div>
    <div id="reset-confirm-area" class="reset-confirm" style="display:none">
      <span id="reset-confirm-text">Wirklich?</span>
      <button class="btn-danger" id="reset-yes" onclick="resetGame()">Ja</button>
      <button class="btn-secondary" id="reset-no" onclick="document.getElementById('reset-confirm-area').style.display='none';document.getElementById('reset-link-area').style.display='block'">Nein</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div id="view-settings" style="display:none; flex-direction:column; gap:14px;">
  <div class="settings-teams">
    <div class="settings-section" id="set-section-a">
      <div class="settings-title" id="set-title-a">Team 1</div>
      <div class="field"><span class="field-label lbl-name">Name</span><input class="name-input" id="set-name-a" oninput="setName('a', this.value)" /></div>
      <div class="field"><span class="field-label lbl-color">Farbe</span><div class="colors" id="set-colors-a"></div></div>
    </div>
    <div class="settings-section" id="set-section-b">
      <div class="settings-title" id="set-title-b">Team 2</div>
      <div class="field"><span class="field-label lbl-name">Name</span><input class="name-input" id="set-name-b" oninput="setName('b', this.value)" /></div>
      <div class="field"><span class="field-label lbl-color">Farbe</span><div class="colors" id="set-colors-b"></div></div>
    </div>
  </div>

  <button class="swap-row-btn" id="swap-btn" onclick="swapTeams()">⇄ Seiten tauschen</button>

  <div class="settings-section">
    <div class="settings-title" id="time-title">Spielzeit</div>
    <div class="field"><span class="field-label" id="halflen-label">Halbzeitlänge (Minuten)</span><input class="number-input" id="set-halflen" type="number" min="1" max="99" inputmode="numeric" oninput="setHalfLength(this.value)" /></div>
  </div>

  <div class="settings-section">
    <div class="settings-title" id="appearance-title">Darstellung</div>
    <div class="settings-row"><span class="settings-row-label" id="design-label">Design</span><button class="toggle-btn" onclick="toggleTheme()" id="theme-btn">🌙 Dunkel</button></div>
    <div class="settings-row"><span class="settings-row-label" id="language-label">Sprache</span><button class="toggle-btn" onclick="toggleLang()" id="lang-btn">🇩🇪 Deutsch</button></div>
  </div>
</div>

<!-- HISTORY -->
<div id="view-history" style="display:none">
  <div class="history" id="history-list"></div>
</div>

<script>
const PRESETS = ['#e24b4a','#4caf50','#378add','#f0f0f0','#f5c842','#ef9f27'];

const ALL_COLORS = [
  '#e24b4a','#c0392b','#e8735a','#ef9f27','#f5c842','#f0e060',
  '#4caf50','#2e7d32','#80cbc4','#26c6da','#378add','#1565c0',
  '#7f77dd','#6a1b9a','#ce93d8','#e91e8c','#f48fb1','#ff80ab',
  '#f0f0f0','#bdbdbd','#9e9e9e','#757575','#424242','#212121',
  '#a0522d','#795548','#ffcc80','#ff8f00','#558b2f','#33691e',
];

const I18N = {
  de: { tabGame:'🤾 Spiel', tabSettings:'⚙️ Einstellungen', tabHistory:'📋 Historie', save:'🏁 Beenden & speichern', saved:'✓ Gespeichert!', finishConfirm:'Spiel beenden und speichern?', half1:'1. Halbzeit', half2:'2. Halbzeit', hz:'HZ', resetGame:'Spiel zurücksetzen', reallyReset:'Wirklich?', yes:'Ja', no:'Nein', team1:'Team 1', team2:'Team 2', nameLabel:'Name', colorLabel:'Farbe', swapSides:'⇄ Seiten tauschen', appearance:'Darstellung', design:'Design', dark:'🌙 Dunkel', lightMode:'☀️ Hell', language:'Sprache', chooseColor:'Farbe wählen', cancel:'Abbrechen', noGames:'Noch keine Spiele gespeichert.', halftime:'Halbzeit', draw:'🤝 Unentschieden', timeTitle:'Spielzeit', halfLenLabel:'Halbzeitlänge (Minuten)', locale:'de-DE' },
  en: { tabGame:'🤾 Game', tabSettings:'⚙️ Settings', tabHistory:'📋 History', save:'🏁 Finish & save', saved:'✓ Saved!', finishConfirm:'Finish and save the game?', half1:'First half', half2:'Second half', hz:'HT', resetGame:'Reset game', reallyReset:'Sure?', yes:'Yes', no:'No', team1:'Team 1', team2:'Team 2', nameLabel:'Name', colorLabel:'Color', swapSides:'⇄ Swap sides', appearance:'Appearance', design:'Theme', dark:'🌙 Dark', lightMode:'☀️ Light', language:'Language', chooseColor:'Choose color', cancel:'Cancel', noGames:'No games saved yet.', halftime:'Halftime', draw:'🤝 Draw', timeTitle:'Match time', halfLenLabel:'Half length (minutes)', locale:'en-US' },
};
function t(key) { return (I18N[state.lang] || I18N.de)[key]; }

const STORAGE_KEY = 'handball_v3';

let state = {
  a: { name: 'TuS Griesheim', color: '#e24b4a' },
  b: { name: 'Gast', color: '#378add' },
  half: 0, halves: { a: [0, 0], b: [0, 0] },
  history: [], darkMode: true, lang: 'de',
  halfLength: 30,
  clockRemaining: 30*60,  // seconds left (authoritative when paused)
  clockRunning: false,
  clockEndsAt: null,      // timestamp (ms) when clock hits 0 (authoritative when running)
};
let colorTarget = null;
let clockTimer = null;

function total(tm) { return state.halves[tm][0] + state.halves[tm][1]; }

function load() {
  let hadData = false;
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) {
      hadData = true;
      const p = JSON.parse(d);
      if (p.a && p.a.name) state.a.name = p.a.name;
      if (p.a && p.a.color) state.a.color = p.a.color;
      if (p.b && p.b.name) state.b.name = p.b.name;
      if (p.b && p.b.color) state.b.color = p.b.color;
      if (p.halves && Array.isArray(p.halves.a) && Array.isArray(p.halves.b)) {
        state.halves = { a: [p.halves.a[0]||0, p.halves.a[1]||0], b: [p.halves.b[0]||0, p.halves.b[1]||0] };
      }
      if (p.half === 0 || p.half === 1) state.half = p.half;
      if (Array.isArray(p.history)) state.history = p.history;
      if (typeof p.darkMode === 'boolean') state.darkMode = p.darkMode;
      if (p.lang === 'de' || p.lang === 'en') state.lang = p.lang;
      if (typeof p.halfLength === 'number' && p.halfLength >= 1 && p.halfLength <= 99) state.halfLength = p.halfLength;
      // restore clock
      if (p.clockRunning && typeof p.clockEndsAt === 'number') {
        const left = Math.round((p.clockEndsAt - Date.now()) / 1000);
        if (left > 0) {
          state.clockRunning = true;
          state.clockEndsAt = p.clockEndsAt;
          state.clockRemaining = left;
        } else {
          state.clockRunning = false;
          state.clockEndsAt = null;
          state.clockRemaining = 0;
        }
      } else {
        state.clockRunning = false;
        state.clockEndsAt = null;
        state.clockRemaining = (typeof p.clockRemaining === 'number') ? p.clockRemaining : state.halfLength * 60;
      }
    } else {
      state.clockRemaining = state.halfLength * 60;
      state.clockRunning = false;
    }
  } catch (e) { console.warn('load failed', e); state.clockRemaining = state.halfLength * 60; state.clockRunning = false; state.clockEndsAt = null; }
  return hadData;
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      a: { name: state.a.name, color: state.a.color },
      b: { name: state.b.name, color: state.b.color },
      halves: state.halves, half: state.half,
      history: state.history, darkMode: state.darkMode, lang: state.lang,
      halfLength: state.halfLength,
      clockRunning: state.clockRunning,
      clockRemaining: state.clockRemaining,
      clockEndsAt: state.clockEndsAt
    }));
  } catch (e) { console.warn('save failed', e); }
}

function applyTheme() {
  document.body.classList.toggle('light', !state.darkMode);
  document.getElementById('theme-btn').textContent = state.darkMode ? t('dark') : t('lightMode');
}

function toggleTheme() { state.darkMode = !state.darkMode; applyTheme(); save(); }

function toggleLang() { state.lang = state.lang === 'de' ? 'en' : 'de'; applyLang(); render(); renderSettings(); save(); }

function applyLang() {
  try {
    document.documentElement.lang = state.lang;
    document.getElementById('tab-game').textContent = t('tabGame');
    document.getElementById('tab-settings').textContent = t('tabSettings');
    document.getElementById('tab-history').textContent = t('tabHistory');
    document.getElementById('reset-link').textContent = t('resetGame');
    document.getElementById('reset-confirm-text').textContent = t('reallyReset');
    document.getElementById('reset-yes').textContent = t('yes');
    document.getElementById('reset-no').textContent = t('no');
    document.getElementById('save-btn').textContent = t('save');
    document.getElementById('finish-confirm-text').textContent = t('finishConfirm');
    document.getElementById('set-title-a').textContent = t('team1');
    document.getElementById('set-title-b').textContent = t('team2');
    document.querySelectorAll('.lbl-name').forEach(e => e.textContent = t('nameLabel'));
    document.querySelectorAll('.lbl-color').forEach(e => e.textContent = t('colorLabel'));
    document.getElementById('swap-btn').textContent = t('swapSides');
    document.getElementById('appearance-title').textContent = t('appearance');
    document.getElementById('design-label').textContent = t('design');
    document.getElementById('language-label').textContent = t('language');
    document.getElementById('lang-btn').textContent = state.lang === 'de' ? '🇩🇪 Deutsch' : '🇺🇸 English';
    document.getElementById('color-modal-title').textContent = t('chooseColor');
    document.getElementById('color-cancel').textContent = t('cancel');
    document.getElementById('time-title').textContent = t('timeTitle');
    document.getElementById('halflen-label').textContent = t('halfLenLabel');
    const hb = document.getElementById('half-btn');
    if (hb) hb.textContent = state.half === 0 ? t('half1') : t('half2');
    ['a','b'].forEach(t2 => {
      const hz = document.getElementById('hz-'+t2);
      if (hz) hz.textContent = `${t('hz')} ${state.halves[t2][0]}`;
    });
  } catch (e) { console.warn('applyLang failed', e); }
  renderClock();
  applyTheme();
}

// ---- Clock ----
function fmtClock(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function renderClock() {
  const disp = document.getElementById('clock-display');
  if (!disp) return;
  disp.textContent = fmtClock(state.clockRemaining);
  disp.classList.toggle('running', state.clockRunning);
  disp.classList.toggle('done', state.clockRemaining === 0);
  const btn = document.getElementById('clock-btn');
  if (btn) btn.textContent = state.clockRunning ? '\u23F8\uFE0E' : '\u25B6\uFE0E';
}

function tickClock() {
  if (!state.clockRunning) return;
  const left = Math.round((state.clockEndsAt - Date.now()) / 1000);
  state.clockRemaining = Math.max(0, left);
  renderClock();
  if (state.clockRemaining === 0) onClockEnd();
}

function onClockEnd() {
  state.clockRunning = false;
  state.clockEndsAt = null;
  clearInterval(clockTimer);
  if (state.half === 0) {
    state.half = 1;
    state.clockRemaining = state.halfLength * 60;
    render();
  }
  renderClock();
  save();
}

function startClock() {
  if (state.clockRemaining === 0) state.clockRemaining = state.halfLength * 60;
  state.clockRunning = true;
  state.clockEndsAt = Date.now() + state.clockRemaining * 1000;
  clearInterval(clockTimer);
  clockTimer = setInterval(tickClock, 250);
  renderClock();
  save();
}

function stopClock() {
  // freeze remaining from the authoritative end time
  if (state.clockRunning && state.clockEndsAt) {
    state.clockRemaining = Math.max(0, Math.round((state.clockEndsAt - Date.now()) / 1000));
  }
  state.clockRunning = false;
  state.clockEndsAt = null;
  clearInterval(clockTimer);
  renderClock();
  save();
}

function toggleClock() { state.clockRunning ? stopClock() : startClock(); }

function stopAndReset() {
  state.clockRunning = false;
  state.clockEndsAt = null;
  clearInterval(clockTimer);
  state.clockRemaining = state.halfLength * 60;
  renderClock();
  save();
}

function setHalfLength(v) {
  let n = parseInt(v, 10);
  if (isNaN(n) || n < 1) n = 1;
  if (n > 99) n = 99;
  state.halfLength = n;
  if (!state.clockRunning) { state.clockRemaining = n * 60; renderClock(); }
  save();
}

// ---- Game ----
function render() {
  ['a','b'].forEach(t2 => {
    const s = state[t2];
    document.getElementById('disp-'+t2).textContent = total(t2);
    document.getElementById('disp-'+t2).style.color = s.color;
    document.getElementById('name-'+t2).textContent = s.name;
    document.getElementById('name-'+t2).style.color = s.color;
    document.getElementById('card-'+t2).style.boxShadow = `inset 0 0 0 2px ${s.color}55`;
    const hz = document.getElementById('hz-'+t2);
    hz.textContent = `${t('hz')} ${state.halves[t2][0]}`;
    hz.style.color = s.color;
    const mb = document.getElementById('corr-minus-'+t2);
    mb.disabled = state.halves[t2][state.half] === 0;
    mb.style.color = mb.disabled ? '#444' : '';
  });
  const hb = document.getElementById('half-btn');
  if (hb) hb.textContent = state.half === 0 ? t('half1') : t('half2');
}

function renderSettings() {
  document.getElementById('set-halflen').value = state.halfLength;
  ['a','b'].forEach(t2 => {
    document.getElementById('set-name-'+t2).value = state[t2].name;
    const sec = document.getElementById('set-section-'+t2);
    if (sec) { sec.style.borderColor = state[t2].color; sec.style.boxShadow = `inset 0 0 0 1px ${state[t2].color}`; }
    const title = document.getElementById('set-title-'+t2);
    if (title) title.style.color = state[t2].color;
    const el = document.getElementById('set-colors-'+t2);
    el.innerHTML = '';
    PRESETS.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'color-dot';
      btn.style.background = p;
      btn.style.border = state[t2].color === p ? '2.5px solid var(--text)' : '2px solid transparent';
      btn.style.outline = state[t2].color === p ? '2px solid rgba(128,128,128,0.4)' : 'none';
      btn.onclick = () => { state[t2].color = p; render(); renderSettings(); save(); };
      el.appendChild(btn);
    });
    const more = document.createElement('button');
    more.className = 'color-dot';
    more.style.background = 'var(--btn)';
    more.style.color = 'var(--muted)';
    more.style.fontSize = '18px';
    more.textContent = '+';
    more.style.border = !PRESETS.includes(state[t2].color) ? '2.5px solid var(--text)' : '2px solid var(--btn-border)';
    more.style.outline = !PRESETS.includes(state[t2].color) ? '2px solid rgba(128,128,128,0.4)' : 'none';
    more.onclick = () => { openColorModal(t2); };
    el.appendChild(more);
  });
}

function setName(t2, v) {
  state[t2].name = v;
  const display = v.trim() || (t2 === 'a' ? t('team1') : t('team2'));
  document.getElementById('name-'+t2).textContent = display;
  document.getElementById('name-'+t2).style.color = state[t2].color;
  save();
}

function openColorModal(t2) {
  colorTarget = t2;
  const grid = document.getElementById('color-grid');
  grid.innerHTML = '';
  ALL_COLORS.forEach(p => {
    const btn = document.createElement('button');
    const selected = state[t2].color === p;
    btn.style.cssText = `width:36px;height:36px;border-radius:50%;background:${p};padding:0;border:${selected?'3px solid var(--text)':'2px solid rgba(128,128,128,0.2)'};outline:${selected?'2px solid rgba(128,128,128,0.5)':'none'};cursor:pointer;`;
    btn.onclick = () => { state[colorTarget].color = p; render(); renderSettings(); save(); cancelColor(); };
    grid.appendChild(btn);
  });
  document.getElementById('color-modal').style.display = 'flex';
}

function cancelColor() { document.getElementById('color-modal').style.display = 'none'; }

function addGoal(t2) { state.halves[t2][state.half]++; render(); save(); }
function correct(t2, d) { state.halves[t2][state.half] = Math.max(0, state.halves[t2][state.half] + d); render(); save(); }

function setHalf(h) { state.half = h; render(); save(); }

function swapTeams() {
  const tmpN = state.a.name, tmpC = state.a.color;
  state.a.name = state.b.name; state.a.color = state.b.color;
  state.b.name = tmpN; state.b.color = tmpC;
  const tmpH = state.halves.a; state.halves.a = state.halves.b; state.halves.b = tmpH;
  render(); renderSettings(); save();
}

function askFinish() {
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('finish-confirm-area').style.display = 'flex';
}

function cancelFinish() {
  document.getElementById('finish-confirm-area').style.display = 'none';
  document.getElementById('save-btn').style.display = 'block';
}

function saveGame() {
  const now = new Date();
  state.history.unshift({
    id: Date.now(),
    date: now.toLocaleDateString(t('locale'),{day:'2-digit',month:'2-digit',year:'numeric'}),
    time: now.toLocaleTimeString(t('locale'),{hour:'2-digit',minute:'2-digit'}),
    ht: { a: state.halves.a[0], b: state.halves.b[0] },
    teams: [
      { name: state.a.name, score: total('a'), color: state.a.color },
      { name: state.b.name, score: total('b'), color: state.b.color },
    ]
  });
  // reset game after finishing: scores, half, clock
  state.halves = { a: [0,0], b: [0,0] };
  state.half = 0;
  state.clockRunning = false;
  state.clockEndsAt = null;
  clearInterval(clockTimer);
  state.clockRemaining = state.halfLength * 60;
  save();
  render();
  renderClock();
  renderHistory();
  // restore button, show confirmation flash
  document.getElementById('finish-confirm-area').style.display = 'none';
  const btn = document.getElementById('save-btn');
  btn.style.display = 'block';
  btn.textContent = t('saved');
  btn.style.background = '#1a3a1a'; btn.style.color = '#5cb85c'; btn.style.borderColor = 'transparent';
  setTimeout(() => { btn.textContent = t('save'); btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
}

function resetGame() {
  state.halves = { a: [0,0], b: [0,0] };
  state.half = 0;
  stopClock();
  state.clockRemaining = state.halfLength * 60;
  renderClock();
  save();
  document.getElementById('reset-confirm-area').style.display = 'none';
  document.getElementById('reset-link-area').style.display = 'block';
  render();
}

function winner(g) {
  const [a,b] = g.teams;
  if (a.score > b.score) return '🏆 ' + a.name;
  if (b.score > a.score) return '🏆 ' + b.name;
  return t('draw');
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!state.history.length) { el.innerHTML = `<div class="history-empty"><div class="icon">📋</div>${t('noGames')}</div>`; return; }
  el.innerHTML = state.history.map(g => {
    let halftimeLine = '';
    if (g.ht) {
      halftimeLine = `<div style="font-size:11px;color:var(--muted);text-align:center;margin-top:4px;">${t('halftime')} ${g.ht.a} : ${g.ht.b}</div>`;
    }
    return `
    <div class="history-card">
      <div class="history-meta"><span>${g.date} · ${g.time}</span><button class="del-btn" onclick="deleteGame(${g.id})">✕</button></div>
      <div class="history-score-row">
        <div class="history-team"><div class="history-dot" style="background:${g.teams[0].color}"></div><span>${g.teams[0].name}</span></div>
        <div class="history-score"><span style="color:${g.teams[0].color}">${g.teams[0].score}</span><span style="color:var(--muted)"> : </span><span style="color:${g.teams[1].color}">${g.teams[1].score}</span></div>
        <div class="history-team"><span>${g.teams[1].name}</span><div class="history-dot" style="background:${g.teams[1].color}"></div></div>
      </div>
      <div class="history-winner">${winner(g)}</div>
      ${halftimeLine}
    </div>`;
  }).join('');
}

function deleteGame(id) { state.history = state.history.filter(g => g.id !== id); save(); renderHistory(); }

function showView(v) {
  document.getElementById('view-game').style.display = v === 'game' ? 'contents' : 'none';
  document.getElementById('view-settings').style.display = v === 'settings' ? 'flex' : 'none';
  document.getElementById('view-history').style.display = v === 'history' ? 'block' : 'none';
  document.getElementById('tab-game').className = v === 'game' ? 'active' : '';
  document.getElementById('tab-settings').className = v === 'settings' ? 'active' : '';
  document.getElementById('tab-history').className = v === 'history' ? 'active' : '';
  if (v === 'settings') renderSettings();
  if (v === 'history') renderHistory();
}

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener('dblclick', e => e.preventDefault());
document.body.addEventListener('touchmove', e => { e.stopPropagation(); }, { passive: true });

if ('wakeLock' in navigator) {
  let wl = null;
  const req = async () => { try { wl = await navigator.wakeLock.request('screen'); } catch {} };
  req();
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') req(); });
}

const swScope = location.pathname.replace(/\/[^/]*$/, '/') || '/';
if ('serviceWorker' in navigator) {
  const sw = `const CACHE='handball-v3';self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['${swScope}']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  const blob = new Blob([sw], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}

function init() {
  const hadData = load();
  render();
  renderClock();
  applyLang();
  // resume ticking if the clock was still running
  if (state.clockRunning && state.clockRemaining > 0) {
    clearInterval(clockTimer);
    clockTimer = setInterval(tickClock, 250);
  }
  if (!hadData) save();
}
if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { init(); }
</script>
</body>
</html>
