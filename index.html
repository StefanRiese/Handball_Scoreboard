<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Handball"/>
  <meta name="theme-color" content="#0f0f0f"/>
  <title>Handball Scoreboard</title>
  <link rel="apple-touch-icon" href="handball_icon.png"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0f0f0f; --card: #1a1a1a; --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #888; --btn: #252525; --btn-border: rgba(255,255,255,0.12); }
    .light { --bg: #f2f2f7; --card: #ffffff; --border: rgba(0,0,0,0.08); --text: #111; --muted: #888; --btn: #e5e5ea; --btn-border: rgba(0,0,0,0.12); }
    html { height: 100%; overflow: hidden; position: fixed; width: 100%; }
    body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: env(safe-area-inset-top, 16px) 12px env(safe-area-inset-bottom, 32px); display: flex; flex-direction: column; gap: 14px; transition: background 0.3s; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; transition: transform 0.1s; }
    button:active { transform: scale(0.93); }
    button:disabled { cursor: not-allowed; transform: none; }
    .tabbar { display: flex; gap: 4px; background: var(--card); border-radius: 14px; padding: 4px; margin-top: 8px; }
    .tabbar button { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--muted); min-height: 48px; }
    .tabbar button.active { background: var(--btn); color: var(--text); }
    .teams { display: flex; gap: 12px; align-items: stretch; }
    .team-card { flex: 1; min-width: 0; background: var(--card); border: 0.5px solid var(--border); border-radius: 20px; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .team-name-btn { background: none; border: none; display: flex; align-items: center; justify-content: center; padding: 8px 12px; border-radius: 10px; min-height: 44px; font-size: 16px; font-weight: 500; cursor: pointer; width: 100%; }
    .team-name-btn span { white-space: normal; word-break: break-word; text-align: center; }
    .team-name-input { font-size: 16px; font-weight: 500; text-align: center; border: none; border-bottom: 2px solid; background: transparent; outline: none; width: 90%; color: var(--text); padding: 4px 0; }
    .team-score { font-size: 80px; font-weight: 500; line-height: 1; letter-spacing: -2px; }
    .goal-btn { width: 80px; height: 80px; border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; }
    .corr-row { display: flex; gap: 10px; width: 100%; }
    .corr-btn { flex: 1; padding: 14px 0; border-radius: 12px; border: 0.5px solid var(--btn-border); background: var(--btn); font-size: 16px; font-weight: 500; min-height: 48px; color: var(--text); }
    .corr-btn:disabled { color: #444; }
    .colors { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; padding: 0; }
    .color-hex { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); font-family: monospace; }
    .color-hex-dot { width: 12px; height: 12px; border-radius: 50%; }
    .action-row { display: flex; gap: 10px; margin-top: 8px; }
    .icon-btn { flex: 0 0 auto; padding: 16px 18px; border-radius: 14px; font-size: 22px; min-height: 54px; background: var(--btn); border: 0.5px solid var(--btn-border); display: flex; align-items: center; justify-content: center; }
    .save-btn { flex: 1; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 500; min-height: 54px; display: block; background: var(--btn); border: 0.5px solid var(--btn-border); color: var(--text); transition: background 0.3s, color 0.3s, transform 0.1s; }
    .save-btn:active { transform: scale(0.97); }
    .reset-area { text-align: center; }
    .reset-link { font-size: 14px; color: var(--muted); background: none; border: none; text-decoration: underline; padding: 12px 20px; min-height: 48px; }
    .reset-confirm { display: flex; gap: 10px; justify-content: center; align-items: center; }
    .reset-confirm span { font-size: 13px; color: var(--muted); }
    .btn-danger { padding: 12px 20px; border-radius: 10px; background: #e24b4a; color: #fff; font-size: 14px; min-height: 48px; }
    .btn-secondary { padding: 12px 20px; border-radius: 10px; border: 0.5px solid var(--btn-border); background: var(--btn); font-size: 14px; color: var(--text); min-height: 48px; }
    .history { display: flex; flex-direction: column; gap: 10px; }
    .history-empty { text-align: center; color: var(--muted); font-size: 14px; margin-top: 40px; }
    .history-empty .icon { font-size: 40px; margin-bottom: 10px; }
    .history-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 16px; }
    .history-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .history-meta span { font-size: 12px; color: var(--muted); }
    .del-btn { background: none; border: none; color: #555; font-size: 20px; padding: 4px 8px; min-height: 44px; min-width: 44px; border-radius: 8px; }
    .history-score-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .history-team { display: flex; align-items: center; gap: 8px; font-size: 15px; color: var(--text); }
    .history-dot { width: 12px; height: 12px; border-radius: 50%; }
    .history-score { font-size: 24px; font-weight: 500; letter-spacing: 4px; }
    .history-winner { font-size: 13px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>

<div id="color-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center;" onclick="if(event.target===this)cancelColor()">
  <div style="background:var(--card); border-radius:20px; padding:24px; width:300px; display:flex; flex-direction:column; gap:16px;">
    <div style="font-size:16px; font-weight:500; color:var(--text); text-align:center;">Farbe wählen</div>
    <div id="color-grid" style="display:grid; grid-template-columns:repeat(6,1fr); gap:10px;"></div>
    <button onclick="cancelColor()" style="padding:14px; border-radius:12px; background:var(--btn); border:0.5px solid var(--btn-border); font-size:15px; color:var(--text);">Abbrechen</button>
  </div>
</div>

<div class="tabbar">
  <button class="active" onclick="showView('game')" id="tab-game">🤾 Spiel</button>
  <button onclick="showView('history')" id="tab-history">📋 Historie</button>
</div>

<div id="view-game" style="display:contents">
  <div class="teams">
    <div class="team-card" id="card-a">
      <div id="name-display-a">
        <button class="team-name-btn" onclick="editName('a')"><span id="name-text-a">TuS Griesheim</span></button>
      </div>
      <input class="team-name-input" id="name-input-a" style="display:none" onblur="saveName('a')" onkeydown="if(event.key==='Enter')saveName('a')"/>
      <div class="team-score" id="disp-a">0</div>
      <button class="goal-btn" onclick="addGoal('a')">+</button>
      <div class="corr-row">
        <button class="corr-btn" id="corr-minus-a" onclick="correct('a',-1)">− 1</button>
        <button class="corr-btn" onclick="correct('a',1)">+ 1</button>
      </div>
      <div class="colors" id="colors-a"></div>
      <div class="color-hex" id="hex-a" style="display:none"><div class="color-hex-dot" id="hex-dot-a"></div><span id="hex-text-a"></span></div>
    </div>
    <div class="team-card" id="card-b">
      <div id="name-display-b">
        <button class="team-name-btn" onclick="editName('b')"><span id="name-text-b">Gast</span></button>
      </div>
      <input class="team-name-input" id="name-input-b" style="display:none" onblur="saveName('b')" onkeydown="if(event.key==='Enter')saveName('b')"/>
      <div class="team-score" id="disp-b">0</div>
      <button class="goal-btn" onclick="addGoal('b')">+</button>
      <div class="corr-row">
        <button class="corr-btn" id="corr-minus-b" onclick="correct('b',-1)">− 1</button>
        <button class="corr-btn" onclick="correct('b',1)">+ 1</button>
      </div>
      <div class="colors" id="colors-b"></div>
      <div class="color-hex" id="hex-b" style="display:none"><div class="color-hex-dot" id="hex-dot-b"></div><span id="hex-text-b"></span></div>
    </div>
  </div>

  <div class="action-row">
    <button class="icon-btn" onclick="swapTeams()">⇄</button>
    <button class="save-btn" id="save-btn" onclick="saveGame()">💾 In Historie speichern</button>
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
  </div>

  <div class="reset-area">
    <div id="reset-link-area">
      <button class="reset-link" onclick="document.getElementById('reset-link-area').style.display='none';document.getElementById('reset-confirm-area').style.display='flex'">Spiel zurücksetzen</button>
    </div>
    <div id="reset-confirm-area" class="reset-confirm" style="display:none">
      <span>Wirklich?</span>
      <button class="btn-danger" onclick="resetGame()">Ja</button>
      <button class="btn-secondary" onclick="document.getElementById('reset-confirm-area').style.display='none';document.getElementById('reset-link-area').style.display='block'">Nein</button>
    </div>
  </div>
</div>

<div id="view-history" style="display:none">
  <div class="history" id="history-list"></div>
</div>

<script>
const PRESETS = ['#e24b4a','#4caf50','#378add','#f0f0f0','#f5c842','#ef9f27'];

const ALL_COLORS = [
  '#e24b4a','#c0392b','#e8735a','#ef9f27','#f5c842','#f0e060',
  '#4caf50','#2e7d32','#80cbc4','#26c6da','#378add','#1565c0',
  '#7f77dd','#6a1b9a','#ce93d8','#e91e8c','#f48fb1','#ff80ab',
  '#f0f0f0','#bdbdbd','#9e9e9e','#757575','#424242','#212121',
  '#a0522d','#795548','#ffcc80','#ff8f00','#558b2f','#33691e',
];

const STORAGE_KEY = 'handball_v2';

let state = {
  a: { name: 'TuS Griesheim', score: 0, color: '#e24b4a' },
  b: { name: 'Gast', score: 0, color: '#378add' },
  history: [], darkMode: true,
};
let colorTarget = null;

function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) {
      const p = JSON.parse(d);
      if (Array.isArray(p.history)) state.history = p.history;
      if (typeof p.darkMode === 'boolean') state.darkMode = p.darkMode;
    }
  } catch (e) { console.warn('load failed', e); }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ history: state.history, darkMode: state.darkMode })); } catch {}
}

function applyTheme() {
  document.body.classList.toggle('light', !state.darkMode);
  document.getElementById('theme-btn').textContent = state.darkMode ? '🌙' : '☀️';
}

function toggleTheme() { state.darkMode = !state.darkMode; applyTheme(); save(); }

function render() {
  ['a','b'].forEach(t => {
    const s = state[t];
    document.getElementById('disp-'+t).textContent = s.score;
    document.getElementById('disp-'+t).style.color = s.color;
    document.getElementById('name-text-'+t).textContent = s.name;
    document.querySelector('#name-display-'+t+' button').style.color = s.color;
    document.getElementById('name-input-'+t).style.borderBottomColor = s.color;
    document.querySelector('#card-'+t+' .goal-btn').style.background = s.color;
    document.querySelector('#card-'+t+' .goal-btn').style.boxShadow = `0 0 0 6px ${s.color}22`;
    document.getElementById('corr-minus-'+t).disabled = s.score === 0;
    document.getElementById('corr-minus-'+t).style.color = s.score === 0 ? '#444' : '';
    renderColors(t);
  });
}

function renderColors(t) {
  const c = state[t].color;
  const el = document.getElementById('colors-'+t);
  el.innerHTML = '';
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'color-dot';
    btn.style.background = p;
    btn.style.border = c === p ? '2.5px solid #fff' : '2px solid transparent';
    btn.style.outline = c === p ? '2px solid rgba(128,128,128,0.4)' : 'none';
    btn.onclick = () => { state[t].color = p; render(); };
    el.appendChild(btn);
  });
  const more = document.createElement('button');
  more.className = 'color-dot';
  more.style.background = 'var(--btn)';
  more.style.color = 'var(--muted)';
  more.style.display = 'flex';
  more.style.alignItems = 'center';
  more.style.justifyContent = 'center';
  more.style.fontSize = '20px';
  more.style.lineHeight = '1';
  more.textContent = '+';
  more.style.border = !PRESETS.includes(c) ? '2.5px solid #fff' : '2px solid var(--btn-border)';
  more.style.outline = !PRESETS.includes(c) ? '2px solid rgba(128,128,128,0.4)' : 'none';
  more.onclick = () => { openColorModal(t); };
  el.appendChild(more);
  const hexEl = document.getElementById('hex-'+t);
  if (!PRESETS.includes(c)) {
    hexEl.style.display = 'flex';
    document.getElementById('hex-dot-'+t).style.background = c;
    document.getElementById('hex-text-'+t).textContent = c;
  } else { hexEl.style.display = 'none'; }
}

function openColorModal(t) {
  colorTarget = t;
  const grid = document.getElementById('color-grid');
  grid.innerHTML = '';
  ALL_COLORS.forEach(p => {
    const btn = document.createElement('button');
    const selected = state[t].color === p;
    btn.style.cssText = `width:36px;height:36px;border-radius:50%;background:${p};padding:0;border:${selected?'3px solid #fff':'2px solid rgba(128,128,128,0.2)'};outline:${selected?'2px solid rgba(128,128,128,0.5)':'none'};cursor:pointer;`;
    btn.onclick = () => { state[colorTarget].color = p; render(); cancelColor(); };
    grid.appendChild(btn);
  });
  document.getElementById('color-modal').style.display = 'flex';
}

function cancelColor() { document.getElementById('color-modal').style.display = 'none'; }

function addGoal(t) { state[t].score++; render(); }
function correct(t, d) { state[t].score = Math.max(0, state[t].score + d); render(); }

function swapTeams() {
  const tmp = { ...state.a }; state.a = { ...state.b }; state.b = { ...tmp }; render();
}

function editName(t) {
  document.getElementById('name-display-'+t).style.display = 'none';
  const inp = document.getElementById('name-input-'+t);
  inp.style.display = 'block'; inp.style.borderBottomColor = state[t].color; inp.value = state[t].name; inp.focus();
}

function saveName(t) {
  const v = document.getElementById('name-input-'+t).value.trim();
  if (v) state[t].name = v;
  document.getElementById('name-input-'+t).style.display = 'none';
  document.getElementById('name-display-'+t).style.display = 'block';
  render();
}

function saveGame() {
  const now = new Date();
  state.history.unshift({
    id: Date.now(),
    date: now.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}),
    time: now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}),
    teams: [
      { name: state.a.name, score: state.a.score, color: state.a.color },
      { name: state.b.name, score: state.b.score, color: state.b.color },
    ]
  });
  save();
  const btn = document.getElementById('save-btn');
  btn.textContent = '✓ Gespeichert!';
  btn.style.background = '#1a3a1a'; btn.style.color = '#5cb85c'; btn.style.borderColor = 'transparent';
  setTimeout(() => { btn.textContent = '💾 In Historie speichern'; btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
  renderHistory();
}

function resetGame() {
  state.a.score = 0; state.b.score = 0;
  document.getElementById('reset-confirm-area').style.display = 'none';
  document.getElementById('reset-link-area').style.display = 'block';
  render();
}

function winner(g) {
  const [a,b] = g.teams;
  if (a.score > b.score) return '🏆 ' + a.name;
  if (b.score > a.score) return '🏆 ' + b.name;
  return '🤝 Unentschieden';
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!state.history.length) { el.innerHTML = '<div class="history-empty"><div class="icon">📋</div>Noch keine Spiele gespeichert.</div>'; return; }
  el.innerHTML = state.history.map(g => `
    <div class="history-card">
      <div class="history-meta"><span>${g.date} · ${g.time}</span><button class="del-btn" onclick="deleteGame(${g.id})">✕</button></div>
      <div class="history-score-row">
        <div class="history-team"><div class="history-dot" style="background:${g.teams[0].color}"></div><span>${g.teams[0].name}</span></div>
        <div class="history-score"><span style="color:${g.teams[0].color}">${g.teams[0].score}</span><span style="color:var(--muted)"> : </span><span style="color:${g.teams[1].color}">${g.teams[1].score}</span></div>
        <div class="history-team"><span>${g.teams[1].name}</span><div class="history-dot" style="background:${g.teams[1].color}"></div></div>
      </div>
      <div class="history-winner">${winner(g)}</div>
    </div>`).join('');
}

function deleteGame(id) { state.history = state.history.filter(g => g.id !== id); save(); renderHistory(); }

function showView(v) {
  document.getElementById('view-game').style.display = v === 'game' ? 'contents' : 'none';
  document.getElementById('view-history').style.display = v === 'history' ? 'block' : 'none';
  document.getElementById('tab-game').className = v === 'game' ? 'active' : '';
  document.getElementById('tab-history').className = v === 'history' ? 'active' : '';
  if (v === 'history') renderHistory();
}

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener('dblclick', e => e.preventDefault());
document.body.addEventListener('touchmove', e => { e.stopPropagation(); }, { passive: true });

if ('wakeLock' in navigator) {
  let wl = null;
  const req = async () => { try { wl = await navigator.wakeLock.request('screen'); } catch {} };
  req();
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') req(); });
}

const swScope = location.pathname.replace(/\/[^/]*$/, '/') || '/';
if ('serviceWorker' in navigator) {
  const sw = `const CACHE='handball-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['${swScope}']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  const blob = new Blob([sw], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}

function init() {
  load();
  applyTheme();
  render();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
